<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mon Journal Cerise 🍒</title>
  <meta name="description" content="Journal de bord digital ADHD-friendly : agenda, habitudes, budget, humeur et brain dump — tout en un.">
  <meta name="theme-color" content="#D2143A">
  <meta name="robots" content="noindex">
  <meta property="og:title" content="Mon Journal Cerise 🍒">
  <meta property="og:description" content="Journal de bord digital : agenda, habitudes, budget et humeur.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shrikhand&family=Quicksand:wght@400;500;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  <style>
/* ── VARIABLES ── */
:root {
  --cerise: #D2143A;
  --rose:   #FF85A1;
  --creme:  #FFF5F8;
  --orange: #FFB38E;
  --texte:  #3D2535;
  --fond:   #F4D6D2;
  --vert:   #22c55e;
  --glass:  rgba(255,255,255,.72);
  --glass-b: rgba(255,255,255,.88);
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Quicksand', sans-serif;
  background:
    radial-gradient(ellipse at 15% 10%, rgba(255,182,215,.55) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 15%, rgba(200,180,255,.45) 0%, transparent 40%),
    radial-gradient(ellipse at 80% 85%, rgba(255,160,190,.4) 0%, transparent 45%),
    radial-gradient(ellipse at 20% 80%, rgba(180,200,255,.35) 0%, transparent 40%),
    linear-gradient(145deg, #ffe8f0 0%, #f8e4ff 40%, #e4eeff 70%, #ffe8f0 100%);
  background-attachment: fixed;
  color: var(--texte);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: 90px;
  -webkit-font-smoothing: antialiased;
}

/* ── TYPO ── */
.t-big {
  font-family:'Shrikhand',cursive;
  background: linear-gradient(135deg, #D2143A 0%, #e8174a 35%, #ff6b8a 70%, #ff85a1 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  text-transform:uppercase; letter-spacing:.08em;
  filter: drop-shadow(0 3px 8px rgba(210,20,58,.22));
}
.t-case  { font-family:'Shrikhand',cursive; color:var(--cerise); text-transform:uppercase; letter-spacing:.08em; }
.t-orange{ font-family:'Shrikhand',cursive; color:#f97316; text-transform:uppercase; letter-spacing:.08em; }
.t-green { font-family:'Shrikhand',cursive; color:var(--vert);   text-transform:uppercase; letter-spacing:.08em; }
.hand    { font-family:'Caveat',cursive; }
.retro   { font-family:'Shrikhand',cursive; }

/* ── CARDS ── */
.card {
  background: rgba(255,255,255,.78);
  backdrop-filter: blur(22px) saturate(180%);
  -webkit-backdrop-filter: blur(22px) saturate(180%);
  border: 1.5px solid rgba(255,255,255,.92);
  border-radius: 28px;
  padding: 20px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.95),
    inset 0 -1px 0 rgba(210,20,58,.03),
    0 4px 16px rgba(210,20,58,.08),
    0 16px 48px rgba(180,120,160,.10),
    0 32px 64px rgba(100,80,120,.06);
}

.polaroid {
  background: white;
  padding: 10px 10px 38px;
  border: 1px solid #f0e8e8;
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,.1);
  animation: float 6s ease-in-out infinite;
}
.polaroid img { width:100%; height:175px; object-fit:cover; display:block; transition:opacity .35s; }
.slide-dots { position:absolute; bottom:10px; left:0; right:0; display:flex; justify-content:center; gap:6px; }
.s-dot { width:7px; height:7px; border-radius:50%; background:rgba(210,20,58,.25); border:none; cursor:pointer; padding:0; transition:all .2s; }
.s-dot.on { background:var(--cerise); transform:scale(1.3); }

.post-it {
  background: linear-gradient(145deg, #fffde7, #fff9c4);
  padding: 20px;
  border-left: 6px solid #f6c90e;
  border-radius: 6px 22px 22px 6px;
  font-family: 'Caveat', cursive;
  box-shadow: 4px 6px 18px rgba(180,150,0,.13), 0 2px 6px rgba(0,0,0,.06);
  transform: rotate(-.6deg);
}
.post-rose {
  background: linear-gradient(145deg, #fff0ee, #ffe4e1);
  padding: 20px;
  border-left: 6px solid #ffaaa0;
  border-radius: 6px 22px 22px 6px;
  font-family: 'Caveat', cursive;
  box-shadow: 4px 6px 18px rgba(200,80,80,.1), 0 2px 6px rgba(0,0,0,.06);
  transform: rotate(.6deg);
}

/* ── BOUTONS ── */
.btn {
  background: linear-gradient(135deg, #D2143A 0%, #e8174a 100%);
  color: white;
  border: none;
  border-radius: 99px;
  padding: 8px 16px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 800;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .15em;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(210,20,58,.32), inset 0 1px 0 rgba(255,255,255,.2);
  transition: all .18s;
}
.btn:hover { filter:brightness(1.08); transform:translateY(-1px); }
.btn:active { transform:scale(.96) translateY(0); }
.btn-xs {
  background: #fff0f3;
  color: var(--cerise);
  border: none;
  border-radius: 99px;
  padding: 4px 10px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 800;
  font-size: 9px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .15s;
}
.btn-xs:hover { background:#ffe0e8; }
.btn-green { background:var(--vert); box-shadow:0 2px 8px rgba(34,197,94,.25); }

/* ── INPUTS ── */
.iline {
  width: 100%;
  border: none;
  border-bottom: 2px solid #fca5a5;
  outline: none;
  background: transparent;
  padding: 6px 0;
  font-family: 'Caveat', cursive;
  font-size: 18px;
  color: var(--texte);
  transition: border-color .2s;
}
.iline:focus { border-bottom-color: var(--cerise); }
.iline::placeholder { color:#ddd; }

/* ── PROGRESS ── */
.pbar { width:100%; background:#f0fdf4; border-radius:99px; height:9px; overflow:hidden; }
.pfill { height:100%; border-radius:99px; transition:width .45s ease; }

/* ── LAYOUT ── */
.page { display:none; padding:14px; max-width:1280px; margin:0 auto; }
.page.on { display:block; }

.jgrid { display:grid; grid-template-columns:1fr; gap:16px; }
@media(min-width:768px){ .jgrid { grid-template-columns:3fr 6fr 3fr; } }

.cgrid { display:grid; grid-template-columns:1fr; gap:16px; }
@media(min-width:768px){ .cgrid { grid-template-columns:7fr 5fr; } }

.col { display:flex; flex-direction:column; gap:14px; }

.pitrow { display:grid; grid-template-columns:1fr; gap:20px; margin-top:20px; }
@media(min-width:768px){ .pitrow { grid-template-columns:1fr 1fr; } }

/* ── NAV ── */
#nav {
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(24px) saturate(200%);
  -webkit-backdrop-filter: blur(24px) saturate(200%);
  border: 2.5px solid rgba(255,255,255,.98);
  border-radius: 99px;
  padding: 7px 10px;
  display: flex;
  gap: 4px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,1),
    0 4px 16px rgba(210,20,58,.1),
    0 16px 40px rgba(0,0,0,.1);
}
.nbtn {
  padding: 10px 22px;
  border: none;
  border-radius: 99px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 800;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .1em;
  cursor: pointer;
  transition: all .22s cubic-bezier(.34,1.56,.64,1);
  background: transparent;
  color: #c0a8b0;
}
.nbtn.on {
  background: linear-gradient(135deg, #D2143A 0%, #e8174a 50%, #ff6080 100%);
  color: white;
  box-shadow: 0 3px 12px rgba(210,20,58,.4), inset 0 1px 0 rgba(255,255,255,.25);
  transform: scale(1.04);
}

/* ── CALENDRIER ── */
.chead { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:6px; }
.clbl  { text-align:center; font-size:9px; font-weight:800; color:var(--rose); letter-spacing:.08em; }
.cgrd  { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
.cday  {
  min-height:80px; border:2px solid #fff0f3; border-radius:12px;
  padding:4px; cursor:pointer; background:white; transition:all .15s;
  overflow:hidden; position:relative; vertical-align:top;
}
.cday:hover { border-color:var(--rose); transform:scale(1.06); z-index:2; }
.cday.today { border-color:var(--cerise); background:#fff5f8; }
.cday.empty { background:transparent; border:none; cursor:default; }
.cdnum { font-size:10px; font-weight:800; color:#ccc; line-height:1; }
.cday.today .cdnum { color:var(--cerise); }
.cdmood { position:absolute; top:1px; right:2px; font-size:9px; }
.cdevts { margin-top:2px; display:flex; flex-direction:column; gap:1px; }
.cdot   { height:4px; border-radius:99px; width:100%; }
.cdot.pro { background:#60a5fa; }
.cdot.perso { background:var(--cerise); }

/* ── HABITS ── */
.hrow { display:flex; justify-content:space-between; align-items:center; margin-bottom:9px; }
.hcheck {
  width:30px; height:30px; border-radius:50%;
  border:2px solid #fca5a5; background:#fff5f8;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:13px; transition:all .2s; flex-shrink:0; color:white;
}
.hcheck.on { background:var(--cerise); border-color:white; box-shadow:0 2px 8px rgba(210,20,58,.3); transform:scale(1.1); }

/* ── MOOD ── */
.mgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:5px; }
.mbtn  { display:flex; flex-direction:column; align-items:center; gap:1px; padding:5px 2px; border-radius:10px; border:none; background:transparent; cursor:pointer; transition:all .2s; opacity:.3; }
.mbtn:hover { opacity:.7; }
.mbtn.on { opacity:1; background:#fff5f8; transform:scale(1.1); box-shadow:0 2px 8px rgba(210,20,58,.1); }
.me { font-size:18px; }
.ml { font-size:7px; font-weight:800; color:#999; text-transform:uppercase; }

/* ── TASKS ── */
.trow { display:flex; align-items:center; gap:9px; font-family:'Caveat',cursive; font-size:18px; margin-bottom:7px; }
.trow.done span { text-decoration:line-through; color:#ccc; }
.ttxt { flex:1; }
.tdel { opacity:0; background:none; border:none; color:#fca5a5; cursor:pointer; font-size:12px; transition:opacity .15s; }
.trow:hover .tdel { opacity:1; }

/* ── MODAL ── */
#modal {
  position:fixed; inset:0; background:rgba(0,0,0,.4);
  backdrop-filter:blur(8px); z-index:200;
  display:flex; align-items:center; justify-content:center; padding:20px;
}
#modal.off { display:none; }
#minr {
  background:white; border-radius:28px; border:8px solid white;
  padding:28px; width:100%; max-width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,.14);
}

/* ── MISC ── */
.sep  { height:1px; background:#fff0f3; margin:8px 0; }
.empty{ text-align:center; padding:16px; font-size:12px; color:#ccc; font-style:italic; }

/* ── HOME PAGE ── */
.home-grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
  padding:16px;
  max-width:960px;
  margin:0 auto;
}
@media(min-width:640px){ .home-grid { grid-template-columns:repeat(2,1fr); gap:20px; padding:20px; } }
@media(min-width:900px){ .home-grid { grid-template-columns:repeat(4,1fr); } }

.app-card {
  background: rgba(255,255,255,.75);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1.5px solid rgba(255,255,255,.92);
  border-radius: 28px;
  padding: 26px 20px 22px;
  cursor: pointer;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.95),
    0 6px 20px rgba(210,20,58,.09),
    0 24px 60px rgba(180,100,140,.08);
  transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
  text-align: left;
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
  position: relative;
  overflow: hidden;
}
.app-card::before {
  content:'';
  position:absolute; top:-30px; right:-20px;
  width:90px; height:90px; border-radius:50%;
  background: radial-gradient(circle, rgba(210,20,58,.07) 0%, transparent 70%);
  pointer-events:none;
}
.app-card:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.95),
    0 12px 32px rgba(210,20,58,.14),
    0 40px 80px rgba(180,100,140,.12);
}
.app-card:focus-visible { outline:3px solid var(--cerise); outline-offset:2px; }
.ac-icon { font-size:38px; line-height:1; filter:drop-shadow(0 4px 8px rgba(210,20,58,.2)); }
.ac-title { font-family:'Shrikhand',cursive; color:var(--cerise); font-size:16px; text-transform:uppercase; letter-spacing:.08em; }
.ac-stat { font-family:'Caveat',cursive; font-size:21px; color:var(--texte); }
.ac-sub { font-size:12px; color:#888; }

/* ── NAV LABEL (caché sur très petit écran) ── */
.nlbl { display:none; }
@media(min-width:400px){ .nlbl { display:inline; } }

/* ── RESPONSIVE FIXES ── */
@media(max-width:480px){
  .jgrid { grid-template-columns:1fr !important; }
  .card { padding:14px; border-radius:20px; }
  .pitrow { grid-template-columns:1fr !important; }
  .cgrd { grid-template-columns:repeat(7,1fr); gap:2px; }
  .cday { min-height:52px; padding:2px; }
  .cdnum { font-size:9px; }
}

/* ── SEMAINE ── */
.wgrid { display:grid; grid-template-columns:repeat(7,minmax(130px,1fr)); gap:8px; min-width:700px; }
.wday { background:white; border:1px solid rgba(255,133,161,.18); border-radius:18px; padding:10px 8px; min-height:180px;
  box-shadow:0 2px 8px rgba(210,20,58,.06); transition:border-color .15s; }
.wday.wtoday { border-color:var(--cerise); background:#fff5f8; }
.wday-hd { font-size:10px; font-weight:800; color:#aaa; text-transform:uppercase; letter-spacing:.08em; margin-bottom:2px; }
.wday-num { font-family:'Shrikhand',cursive; font-size:22px; color:var(--texte); line-height:1; margin-bottom:6px; }
.wday.wtoday .wday-num { color:var(--cerise); }
.wevt { font-size:10px; border-radius:6px; padding:2px 5px; margin-bottom:3px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; cursor:pointer; }
.wevt.pro { background:#dbeafe; color:#1e40af; }
.wevt.perso { background:#fce7f3; color:#9d174d; }
.whabs { display:flex; flex-wrap:wrap; gap:3px; margin-top:6px; }
.whab { font-size:12px; opacity:.35; }
.whab.done { opacity:1; }

/* ── TODO BULLES ── */
.todo-bbl { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid #fff0f3; }
.todo-bbl input[type=checkbox] { appearance:none; -webkit-appearance:none; width:18px; height:18px; border-radius:50%;
  border:2px solid #fca5a5; background:white; cursor:pointer; flex-shrink:0; position:relative; transition:all .15s; }
.todo-bbl input[type=checkbox]:checked { background:var(--cerise); border-color:var(--cerise); }
.todo-bbl input[type=checkbox]:checked::after { content:'✓'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  color:white; font-size:10px; font-weight:900; }
.todo-bbl label { font-family:'Caveat',cursive; font-size:17px; flex:1; cursor:pointer; transition:color .15s; }
.todo-bbl.done label { text-decoration:line-through; color:#bbb; }

/* ── ACCESSIBILITÉ ── */
:focus-visible { outline:3px solid var(--cerise); outline-offset:2px; border-radius:4px; }
button:focus-visible { outline:3px solid var(--cerise); outline-offset:2px; }
/* contraste renforcé sur les textes secondaires */
.ac-sub, .empty { color:#666; }

/* ── ANIMATIONS ── */
@keyframes float { 0%,100%{transform:rotate(-1.5deg) translateY(0)} 50%{transform:rotate(-1.5deg) translateY(-5px)} }
@keyframes bnc   { 0%,100%{transform:translateY(0)}  50%{transform:translateY(-10px)} }

/* ── HOME HERO full viewport ── */
#page-home.on { padding:0 !important; max-width:none !important; }
.home-hero-wrap { max-width:1100px; margin:0 auto; padding:28px 16px 100px; }

/* ── SEMAINE agrandie ── */
.wday { background:rgba(255,255,255,.82); border:1px solid rgba(255,133,161,.18); border-radius:22px; padding:0; min-height:320px;
  box-shadow:0 2px 12px rgba(210,20,58,.06); transition:border-color .15s; display:flex; flex-direction:column; overflow:hidden; }
.wday.wtoday { border-color:var(--cerise); }
.wday-cap { height:8px; width:100%; flex-shrink:0; }
.wday-body { padding:10px 10px 12px; flex:1; display:flex; flex-direction:column; }
.wday-hd { font-size:9px; font-weight:800; color:#bbb; text-transform:uppercase; letter-spacing:.1em; margin-bottom:2px; }
.wday-num { font-family:'Shrikhand',cursive; font-size:26px; color:var(--texte); line-height:1; margin-bottom:8px; }
.wday.wtoday .wday-num { color:var(--cerise); }

  </style>
</head>

<!-- ═══ NAVIGATION ═══ -->
<nav id="nav" role="navigation" aria-label="Navigation principale">
  <button class="nbtn on" id="btn-h" onclick="goPage('home')" aria-label="Accueil">🏠 <span class="nlbl">Accueil</span></button>
  <div style="width:1px;background:#f0dde4;height:22px;margin:0 2px"></div>
  <button class="nbtn" id="btn-j" onclick="goPage('journal')" aria-label="Journal du jour">📓 <span class="nlbl">Journal</span></button>
  <button class="nbtn" id="btn-w" onclick="goPage('week')" aria-label="Semaine">📆 <span class="nlbl">Semaine</span></button>

</nav>

<!-- ═══ ACCUEIL ═══ -->
<div class="page on" id="page-home" role="main">

  <div class="cgrid">
    <div id="cl"></div>
    <div id="cr"></div>

<script>
/* ══════════════════════════════════════════════
   ÉTAPE 2 — ÉTAT + HORLOGE + DIAPORAMA + POMODORO
   (à compléter dans les prochaines étapes)
══════════════════════════════════════════════ */

const KEY = 'jcerise-v1';
const PHOTOS = [

  'https://images.unsplash.com/photo-1518133910546-b6c2fb7d79e3?w=400&q=80',

const MOODS = [

  {e:'😔',l:'Triste'},{e:'😤',l:'Frustrée'},{e:'🤯',l:'Overwhelm'},{e:'😴',l:'Fatiguée'},
];
const MOIS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const SPECIAL_DAYS = {
  '01-01':'🎊','02-14':'💕','03-08':'🌸','03-20':'🌷',
  '04-01':'🐟','05-01':'🌿','06-21':'🎶','07-14':'🎆',
  '08-15':'🌻','09-22':'🍂','10-31':'🎃','11-01':'🕯️',
  '12-25':'🎄','12-31':'🥂'
};

/* Thèmes saisonniers — photo Unsplash + palette couleur par mois */
const MONTH_THEMES = [
  /* Jan */ {s:'❄️ Hiver · Janvier',

/* ── Page switch ── */
function goPage(p){
  curPage=p;
  ['home','journal','week','calendar'].forEach(function(id){
    var el=document.getElementById('page-'+id);
    if(el) el.className=p===id?'page on':'page';
  });
  [['h','home'],['j','journal'],['w','week'],['c','calendar']].forEach(function(pair){
    var el=document.getElementById('btn-'+pair[0]);
    if(el) el.className=p===pair[1]?'nbtn on':'nbtn';
  });
  if(p==='home')     renderHome();
  if(p==='journal')  renderJ();
  if(p==='week')     { if(!weekStart) weekStart=getWeekStart(new Date()); renderWeek(); }
  if(p==='calendar') renderCal();
}
function getWeekStart(d){
  var day=new Date(d); day.setHours(0,0,0,0);
  var dow=day.getDay(); var diff=dow===0?-6:1-dow;
  day.setDate(day.getDate()+diff);
  return day;
}

/* ── Horloge ── */
function tickClock(){
  var now=new Date();
  var time=now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  var secs=':'+String(now.getSeconds()).padStart(2,'0');
  ['clk','hclk'].forEach(function(id){var e=document.getElementById(id);if(e)e.textContent=time;});
  ['clks','hclks'].forEach(function(id){var e=document.getElementById(id);if(e)e.textContent=secs;});
}
setInterval(tickClock,1000);

/* ── Diaporama ── */
function showPhoto(){
  const img=document.getElementById('simg');
  if(!img) return;
  img.style.opacity=0;
  setTimeout(()=>{ img.src=PHOTOS[pIdx]; img.style.opacity=1; },300);
  document.querySelectorAll('.s-dot').forEach((d,i)=>d.classList.toggle('on',i===pIdx));
}

/* ── Pomodoro ── */
function fmtP(s){ return Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60); }
function togPom(){
  pomOn=!pomOn;
  const b=document.getElementById('pbtn');
  if(b) b.textContent=pomOn?'⏸ PAUSE':'▶ START';
}
function rstPom(){
  pomOn=false; pomSec=1500;
  const b=document.getElementById('pbtn'); if(b) b.textContent='▶ START';
  const t=document.getElementById('ptim'); if(t) t.textContent=fmtP(pomSec);
}
setInterval(()=>{
  if(!pomOn) return;
  pomSec--;
  const t=document.getElementById('ptim'); if(t) t.textContent=fmtP(pomSec);
  if(pomSec<=0){ pomOn=false; pomSec=1500; alert("Pause cerise ! 🍒"); renderJ(); }
},1000);

/* ── Météo (Open-Meteo, sans clé API) ── */
function wCode(c){
  if(c===0)  return {e:'☀️',t:'Ensoleillé'};
  if(c<=3)   return {e:'⛅',t:'Nuageux'};
  if(c<=48)  return {e:'🌫️',t:'Brumeux'};
  if(c<=55)  return {e:'🌦️',t:'Bruine'};
  if(c<=65)  return {e:'🌧️',t:'Pluie'};
  if(c<=75)  return {e:'❄️',t:'Neige'};
  if(c<=82)  return {e:'🌦️',t:'Averses'};
  return {e:'⛈️',t:'Orage'};
}
function applyWeather(lat,lon){
  fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,weather_code&timezone=auto')
    .then(function(r){return r.json();})
    .then(function(d){
      var w=wCode(d.current.weather_code);
      var temp=Math.round(d.current.temperature_2m);
      var i=document.getElementById('w-icon'),t=document.getElementById('w-temp'),s=document.getElementById('w-desc');
      if(i) i.textContent=w.e;
      if(t) t.textContent=temp+'°C';
      if(s) s.textContent=w.t;
      var chip=document.getElementById('w-chip');
      if(chip) chip.textContent=w.e+' '+temp+'°C';
    })
    .catch(function(){var s=document.getElementById('w-desc');if(s) s.textContent='Indisponible';});
}
function initWeather(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      function(p){applyWeather(p.coords.latitude,p.coords.longitude);},
      function(){applyWeather(48.8566,2.3522);}
    );
  } else { applyWeather(48.8566,2.3522); }
}

function renderWeek(){
  var today=td();

  var we=new Date(weekStart); we.setDate(we.getDate()+6);
  var th=MONTH_THEMES[ws.getMonth()];
  var glBtn='background:rgba(255,255,255,.22);backdrop-filter:blur(10px);border:1.5px solid rgba(255,255,255,.38);'+
    'border-radius:99px;padding:9px 16px;color:white;font-family:Quicksand,sans-serif;font-weight:800;font-size:12px;cursor:pointer';

  document.getElementById('wh').innerHTML=
    '<div style="position:relative;border-radius:24px;overflow:hidden;margin-bottom:18px;height:clamp(120px,15vw,180px)">'+
      '<img src="'+th.p+'" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 60%" onerror="this.style.display=\'none\'">'+
      '<div style="position:absolute;inset:0;background:'+th.g+'"></div>'+
      '<div style="position:absolute;inset:0;display:flex;justify-content:space-between;align-items:center;padding:clamp(14px,3vw,28px)">'+
        '<div style="color:white">'+
          '<div style="font-size:9px;font-weight:800;letter-spacing:.28em;text-transform:uppercase;opacity:.65;margin-bottom:4px">'+esc(th.s)+'</div>'+
          '<div style="font-family:Shrikhand,cursive;font-size:clamp(20px,4vw,34px);line-height:1;text-shadow:0 2px 12px rgba(0,0,0,.3)">'+
            ws.getDate()+' '+esc(MOIS[ws.getMonth()])+(ws.getFullYear()!==we.getFullYear()?' '+ws.getFullYear():'')+
            ' <span style="opacity:.55">→</span> '+we.getDate()+' '+esc(MOIS[we.getMonth()])+' '+we.getFullYear()+
          '</div>'+
        '</div>'+
        '<div style="display:flex;gap:8px">'+
          '<button onclick="navWeek(-1)" style="'+glBtn+'">◀</button>'+
          '<button onclick="weekStart=getWeekStart(new Date());renderWeek()" style="'+glBtn+'">Auj.</button>'+
          '<button onclick="navWeek(1)" style="'+glBtn+'">▶</button>'+
        '</div>'+
      '</div>'+
    '</div>';

  var cols='';
  for(var i=0;i<7;i++){
    var d=new Date(weekStart); d.setDate(d.getDate()+i);
    var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    var isToday=ds===today;
    var dth=MONTH_THEMES[d.getMonth()]; /* thème du mois de ce jour */
    var evts=S.events.filter(function(e){return e.date===ds;}).sort(function(a,b){return a.time.localeCompare(b.time);});
    var logs=S.habitLogs[ds]||{};
    var mood2=(S.daysData[ds]||{}).mood;
    var ha=(S.daysData[ds]||{}).headache;
    var habDoneW=S.habits.filter(function(h){return logs[h.id];}).length;

    var evHtml=evts.map(function(e){
      return '<div class="wevt '+e.type+'" style="font-size:10px;border-radius:7px;padding:3px 6px;margin-bottom:4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer" onclick="event.stopPropagation();openAddEvent(\''+ds+'\')">'+
        esc(e.time)+' '+esc(e.title)+'</div>';
    }).join('');

    var habHtml=S.habits.map(function(h){
      return '<span title="'+esc(h.name)+'" style="font-size:14px;opacity:'+(logs[h.id]?'1':'.22')+';transition:opacity .15s">'+h.icon+'</span>';
    }).join('');

    cols+=
      '<div class="wday'+(isToday?' wtoday':'')+'" onclick="openAddEvent(\''+ds+'\')" style="cursor:pointer">'+
        /* Bande colorée saisonnière en haut */
        '<div class="wday-cap" style="background:'+(isToday?dth.t:dth.bd)+';opacity:'+(isToday?'1':'.6')+'"></div>'+
        '<div class="wday-body">'+
          '<div class="wday-hd">'+JOURS[i]+'</div>'+
          '<div class="wday-num" style="color:'+(isToday?dth.t:'var(--texte)')+'">'+d.getDate()+'</div>'+
          (mood2!==undefined?'<div style="font-size:18px;margin-bottom:6px">'+MOODS[mood2].e+'</div>':'')+
          (ha?'<div style="font-size:10px;color:var(--cerise);margin-bottom:4px;font-weight:700">🤕 Mal de tête</div>':'')+
          (evHtml?evHtml:'<div style="font-size:10px;color:#d4b8c0;text-align:center;padding:8px 0;font-style:italic">Journée libre</div>')+
          '<div style="margin-top:auto;padding-top:8px;display:flex;gap:4px;flex-wrap:wrap;align-items:center">'+
            habHtml+
            (S.habits.length?'<span style="font-size:9px;color:#bbb;margin-left:2px">'+habDoneW+'/'+S.habits.length+'</span>':'')+
          '</div>'+
        '</div>'+
      '</div>';
  }

  document.getElementById('wg').innerHTML='<div class="wgrid">'+cols+'</div>';
}

function delProjTask(projId,taskId){
  var p=S.projects.find(function(p){return p.id===projId;});
  if(!p)return;
  p.tasks=(p.tasks||[]).filter(function(t){return t.id!==taskId;});
  save();renderCal();
}

try{ load(); }catch(e){ localStorage.removeItem(KEY); }
requestAnimationFrame(function(){
  try{ goPage('home'); }catch(err){
    document.getElementById('hh').innerHTML=
      '<div style="background:#fee2e2;border:2px solid #ef4444;border-radius:20px;padding:20px;margin:16px;font-family:monospace;color:#b91c1c">'+
      '<b>Erreur :</b> '+String(err.message)+'<br><br>'+
      '<button onclick="localStorage.clear();location.reload()" style="background:#ef4444;color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;margin-top:8px">Effacer cache et recharger</button>'+
      '</div>';
  }
});
</script>
