<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<title>Mon Journal</title>
<meta name="theme-color" content="#2a5c3a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=Caveat:wght@400;500&display=swap" rel="stylesheet">
<style>

/* ── RESET ── */
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; -webkit-tap-highlight-color: transparent; }
body { height: 100%; font-family: 'DM Sans', sans-serif; overflow: hidden;
       color: #1e2d1e; -webkit-font-smoothing: antialiased; }

/* ── FOND MENSUEL ── */
#bg {
  position: fixed; inset: 0; z-index: -2;
  transition: background 1.2s ease;
}

/* ── DÉCORATIONS BOTANIQUES (côtés) ── */
#bg-decor {
  position: fixed; inset: 0; z-index: -1;
  pointer-events: none; overflow: hidden;
}

/* ── ZONE DE SCROLL ── */
#app {
  position: fixed; top: 0; left: 0; right: 0; bottom: 72px;
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

/* ── PAGES ── */
.page { display: none; padding: 16px 16px 40px; max-width: 480px; margin: 0 auto; }
.page.active { display: block; }

/* ── CARTES ── */
.card {
  background: rgba(255,255,255,0.68);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border: 1px solid rgba(255,255,255,0.85);
  border-radius: 24px;
  padding: 20px;
  margin-bottom: 12px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.06);
}

/* ── TYPOGRAPHIE ── */
.lbl {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: #8aaa8a; margin-bottom: 4px;
}
.titre {
  font-family: 'Playfair Display', serif;
  font-style: italic; font-size: 26px; font-weight: 400;
  color: #1e2d1e; line-height: 1.2;
}

/* ── NAV ── */
#nav {
  position: fixed; bottom: 0; left: 0; right: 0; height: 72px;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid rgba(0,0,0,0.07);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 0 12px;
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 100;
}
.ntab {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 8px 24px; border-radius: 99px; cursor: pointer;
  color: #9aaa9a; font-size: 11px; font-weight: 500; letter-spacing: 0.04em;
  transition: background 0.2s, color 0.2s;
  border: none; background: none; font-family: 'DM Sans', sans-serif;
}
.ntab svg {
  width: 22px; height: 22px; stroke: currentColor;
  fill: none; stroke-width: 1.8;
  stroke-linecap: round; stroke-linejoin: round;
}
.ntab.active { color: #fff; }

/* ── FAB ── */
#fab {
  position: fixed; bottom: 88px; right: 20px;
  width: 52px; height: 52px; border-radius: 99px;
  background: #1e3d1e; color: #fff; font-size: 26px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; border: none;
  box-shadow: 0 4px 20px rgba(30,61,30,0.35);
  transition: transform 0.2s, background 0.2s;
  z-index: 50;
}
#fab:active { transform: scale(0.94); }

/* ── MODAL ── */
#modal {
  position: fixed; inset: 0; z-index: 200;
  display: none; align-items: flex-end;
  background: rgba(0,0,0,0.38);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
#modal.open { display: flex; }
#modal-box {
  width: 100%; max-width: 480px; margin: 0 auto;
  background: #fff; border-radius: 28px 28px 0 0;
  padding: 12px 20px 48px; max-height: 88vh; overflow-y: auto;
}
#modal-handle {
  width: 40px; height: 4px; background: #e0e0e0;
  border-radius: 99px; margin: 0 auto 20px;
}

/* ── BARRE DE PROGRESSION ── */
.pbar { height: 6px; background: rgba(0,0,0,0.08); border-radius: 99px; overflow: hidden; }
.pbar-fill { height: 100%; border-radius: 99px; transition: width 0.6s ease; }

/* ── BOUTONS ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 12px 24px; border-radius: 99px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; border: none; transition: all 0.2s;
}
.btn-primary { background: #1e3d1e; color: #fff; }
.btn-ghost   { background: rgba(0,0,0,0.06); color: #1e2d1e; }

/* ── INPUTS ── */
input, textarea, select {
  font-family: 'DM Sans', sans-serif; font-size: 15px;
  border: 1.5px solid #e0e8e0; border-radius: 14px;
  padding: 11px 14px; width: 100%; color: #1e2d1e;
  background: #fff; outline: none; transition: border-color 0.15s;
}
input:focus, textarea:focus, select:focus { border-color: #2a5c3a; }
.flbl {
  display: block; font-size: 11px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: #7a9a7a; margin-bottom: 6px;
}
.fgroup { margin-bottom: 16px; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 99px; }

/* ── UTILITAIRES ── */
.row    { display: flex; align-items: center; }
.row-sb { display: flex; align-items: center; justify-content: space-between; }
.sep    { height: 1px; background: rgba(0,0,0,0.06); margin: 8px 0; }

</style>
</head>
<body>

<!-- Fond mensuel -->
<div id="bg"></div>
<div id="bg-decor"></div>

<!-- Pages -->
<div id="app">
  <div id="pg-jour"   class="page active"></div>
  <div id="pg-mois"   class="page"></div>
  <div id="pg-budget" class="page"></div>
</div>

<!-- Navigation -->
<nav id="nav">
  <button class="ntab active" id="tab-jour" onclick="goPage('jour')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>
    Jour
  </button>
  <button class="ntab" id="tab-mois" onclick="goPage('mois')">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Mois
  </button>
  <button class="ntab" id="tab-budget" onclick="goPage('budget')">
    <svg viewBox="0 0 24 24"><path d="M2 8h20M2 16h20"/><rect x="2" y="5" width="20" height="14" rx="3"/></svg>
    Budget
  </button>
</nav>

<!-- Bouton action -->
<button id="fab" onclick="fabAction()">+</button>

<!-- Modal -->
<div id="modal">
  <div id="modal-box">
    <div id="modal-handle"></div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
'use strict';

/* ════════════════════════════════════════
   THÈMES MENSUELS
════════════════════════════════════════ */
var THEMES = [
/* 0 Jan */ {
  bg: 'linear-gradient(160deg,#dce8f2 0%,#edf4f8 50%,#f5f0ec 100%)',
  accent: '#2a5a8a', blobL: 'rgba(170,205,230,0.45)', blobR: 'rgba(200,220,240,0.32)',
  plantsL: ['1f332','2603','1fad6','2744','1f330'],
  plantsR: ['2744','1f332','2603','1fad6','1f330'],
  quote: 'Chaque hiver porte en lui un printemps qui frémit.',
  quoteSub: 'Janvier · Hiver'
},
/* 1 Fév */ {
  bg: 'linear-gradient(160deg,#f2dce8 0%,#faeef5 50%,#fdf5f0 100%)',
  accent: '#a0426a', blobL: 'rgba(235,175,200,0.4)', blobR: 'rgba(250,200,220,0.3)',
  plantsL: ['1f337','1f338','1f339','1f33c','1f4ab'],
  plantsR: ['1f33c','1f338','1f337','1f339','1f4ab'],
  quote: "L'amour est un murmure que la nature entend toujours.",
  quoteSub: 'Février · Hiver doux'
},
/* 2 Mar */ {
  bg: 'linear-gradient(160deg,#d8f0e0 0%,#ecf8f0 50%,#f5fcf5 100%)',
  accent: '#2a7a4a', blobL: 'rgba(155,215,175,0.4)', blobR: 'rgba(175,235,195,0.3)',
  plantsL: ['1f331','1f33f','1f340','1f338','1fab4'],
  plantsR: ['1fab4','1f340','1f331','1f33f','1f338'],
  quote: 'Le printemps est venu — même la branche la plus sèche ose un bourgeon.',
  quoteSub: 'Mars · Printemps'
},
/* 3 Avr */ {
  bg: 'linear-gradient(160deg,#ece0f2 0%,#f5eefb 50%,#fdf5ff 100%)',
  accent: '#7a3a9a', blobL: 'rgba(205,165,235,0.35)', blobR: 'rgba(225,185,255,0.28)',
  plantsL: ['1f337','1f33c','1f338','1f4ab','1fab7'],
  plantsR: ['1fab7','1f33c','1f337','1f338','1f4ab'],
  quote: 'Avril pluvieux, jardin pétillant de promesses.',
  quoteSub: 'Avril · Printemps'
},
/* 4 Mai */ {
  bg: 'linear-gradient(160deg,#d4ece0 0%,#e8f8f0 50%,#f5fdf8 100%)',
  accent: '#1e5c3a', blobL: 'rgba(145,215,175,0.42)', blobR: 'rgba(165,235,195,0.32)',
  plantsL: ['1f33c','1fab7','1f338','1f331','1f340'],
  plantsR: ['1f340','1f338','1f33c','1fab7','1f331'],
  quote: "Que mai t'apporte des matins clairs et la promesse douce du muguet.",
  quoteSub: 'Mai · Printemps'
},
/* 5 Jun */ {
  bg: 'linear-gradient(160deg,#f0f0d0 0%,#f8f8e8 50%,#fffef0 100%)',
  accent: '#7a6a10', blobL: 'rgba(225,215,110,0.35)', blobR: 'rgba(240,230,145,0.28)',
  plantsL: ['1f33b','1f338','1f33c','1fab7','1f340'],
  plantsR: ['1f340','1f33c','1f33b','1f338','1fab7'],
  quote: "L'été commence — le soleil ose enfin rester jusqu'au soir.",
  quoteSub: 'Juin · Été'
},
/* 6 Jul */ {
  bg: 'linear-gradient(160deg,#f2e0cc 0%,#faf0e4 50%,#fffbf5 100%)',
  accent: '#9a5010', blobL: 'rgba(238,185,125,0.35)', blobR: 'rgba(255,205,155,0.28)',
  plantsL: ['1f334','1f33b','1f338','1fab4','1f331'],
  plantsR: ['1f331','1f33b','1f334','1fab4','1f338'],
  quote: "Juillet : le temps ralentit, les pieds dans l'herbe chaude.",
  quoteSub: 'Juillet · Été'
},
/* 7 Aoû */ {
  bg: 'linear-gradient(160deg,#f0e8c8 0%,#f8f4e0 50%,#fffef0 100%)',
  accent: '#8a6000', blobL: 'rgba(228,205,98,0.35)', blobR: 'rgba(245,225,135,0.28)',
  plantsL: ['1f33b','1f33e','1f340','1fab7','1f338'],
  plantsR: ['1f338','1f33e','1f33b','1f340','1fab7'],
  quote: "Août brûle doucement — même l'ombre a une couleur de miel.",
  quoteSub: 'Août · Été'
},
/* 8 Sep */ {
  bg: 'linear-gradient(160deg,#f0e4d0 0%,#f8f0e4 50%,#fdf8f0 100%)',
  accent: '#8a4a10', blobL: 'rgba(228,175,95,0.35)', blobR: 'rgba(245,195,135,0.28)',
  plantsL: ['1f342','1f341','1f343','1f344','1fab9'],
  plantsR: ['1fab9','1f344','1f342','1f341','1f343'],
  quote: "Septembre : la lumière change d'angle et tout devient doré.",
  quoteSub: 'Septembre · Automne'
},
/* 9 Oct */ {
  bg: 'linear-gradient(160deg,#f0dcc8 0%,#f8ece0 50%,#fdf5ee 100%)',
  accent: '#9a3a00', blobL: 'rgba(228,145,75,0.35)', blobR: 'rgba(245,165,105,0.28)',
  plantsL: ['1f342','1f344','1f343','1f341','1fab9'],
  plantsR: ['1fab9','1f341','1f342','1f344','1f343'],
  quote: 'Octobre jonche les chemins de feuilles rousses et de silence.',
  quoteSub: 'Octobre · Automne profond'
},
/* 10 Nov */ {
  bg: 'linear-gradient(160deg,#e4e8e0 0%,#f0f4f0 50%,#f8faf8 100%)',
  accent: '#3a5a3a', blobL: 'rgba(158,178,158,0.35)', blobR: 'rgba(178,198,178,0.28)',
  plantsL: ['1f343','1f341','1f344','1fab9','1f332'],
  plantsR: ['1f332','1f344','1f343','1f341','1fab9'],
  quote: "Novembre est l'heure du silence avant la neige.",
  quoteSub: 'Novembre · Automne tardif'
},
/* 11 Déc */ {
  bg: 'linear-gradient(160deg,#d8eee8 0%,#e8f8f2 50%,#f5fefb 100%)',
  accent: '#1a5a32', blobL: 'rgba(135,205,178,0.42)', blobR: 'rgba(158,228,198,0.32)',
  plantsL: ['1f332','26c4','2744','1f33f','2b50'],
  plantsR: ['2b50','1f33f','1f332','26c4','2744'],
  quote: 'Décembre est là — allume une bougie et laisse le temps ralentir.',
  quoteSub: 'Décembre · Hiver'
}
];

var MOIS_FR   = ['Janvier','Février','Mars','Avril','Mai','Juin',
                 'Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
var JOURS_FR  = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
var JOURS_LONG = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];

var curPage = 'jour';

/* ════════════════════════════════════════
   THÈME : applique fond + décorations
════════════════════════════════════════ */
function applyTheme(m) {
  var th  = THEMES[m];
  var CDN = 'https://cdn.jsdelivr.net/npm/twemoji@14.0.2/assets/svg/';
  var sz  = [54, 44, 50, 40, 36];
  var rot = [-10, 8, -6, 10, -8];

  document.getElementById('bg').style.background = th.bg;

  function mkPanel(list, side) {
    var imgs = '';
    for (var i = 0; i < list.length; i++) {
      imgs += '<img src="' + CDN + list[i] + '.svg" alt="" '
            + 'style="width:' + sz[i] + 'px;height:' + sz[i] + 'px;'
            + 'transform:rotate(' + rot[i] + 'deg);display:block;'
            + 'margin:6px auto;flex-shrink:0" '
            + 'onerror="this.style.display=\'none\'">';
    }
    return '<div style="position:absolute;' + side + ':6px;top:64px;'
         + 'display:flex;flex-direction:column;align-items:center;'
         + 'opacity:0.4;pointer-events:none">' + imgs + '</div>';
  }

  var bL = '<div style="position:absolute;bottom:-80px;left:-100px;width:300px;height:300px;'
         + 'border-radius:50%;background:' + th.blobL + ';filter:blur(48px);pointer-events:none"></div>';
  var bR = '<div style="position:absolute;top:15%;right:-90px;width:260px;height:260px;'
         + 'border-radius:50%;background:' + th.blobR + ';filter:blur(40px);pointer-events:none"></div>';
  var bB = '<div style="position:absolute;bottom:80px;right:16px;width:130px;height:130px;'
         + 'border-radius:50%;background:rgba(255,175,175,0.22);filter:blur(30px);pointer-events:none"></div>';

  document.getElementById('bg-decor').innerHTML =
    bL + bR + bB + mkPanel(th.plantsL, 'left') + mkPanel(th.plantsR, 'right');
}

/* ════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════ */
function goPage(name) {
  curPage = name;
  var th = THEMES[new Date().getMonth()];

  ['jour', 'mois', 'budget'].forEach(function(p) {
    var pg  = document.getElementById('pg-' + p);
    var tab = document.getElementById('tab-' + p);
    if (pg)  pg.className = 'page' + (p === name ? ' active' : '');
    if (tab) {
      tab.className    = 'ntab' + (p === name ? ' active' : '');
      tab.style.background = (p === name ? th.accent : '');
      tab.style.color      = (p === name ? '#fff' : '');
    }
  });

  document.getElementById('app').scrollTop = 0;

  if (name === 'jour')   renderJour();
  if (name === 'mois')   renderMois();
  if (name === 'budget') renderBudget();
}

/* ════════════════════════════════════════
   MODAL
════════════════════════════════════════ */
function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

/* ════════════════════════════════════════
   FAB
════════════════════════════════════════ */
function fabAction() {
  openModal(
    '<p style="font-family:\'Playfair Display\',serif;font-style:italic;font-size:20px;color:#1e2d1e;margin-bottom:12px">Ajouter…</p>'
  + '<p style="color:#8aaa8a;font-size:14px">Bientôt disponible 🌿</p>'
  );
}

/* ════════════════════════════════════════
   RENDUS — squelettes provisoires
════════════════════════════════════════ */
function renderJour() {
  var th = THEMES[new Date().getMonth()];
  document.getElementById('pg-jour').innerHTML =
    '<div class="card" style="margin-top:8px;padding:32px 20px;text-align:center">'
  + '<div class="lbl">' + th.quoteSub + '</div>'
  + '<div class="titre" style="margin-top:8px;font-size:20px">' + th.quote + '</div>'
  + '</div>';
}

function renderMois() {
  var now = new Date();
  document.getElementById('pg-mois').innerHTML =
    '<div class="card" style="margin-top:8px;padding:32px 20px;text-align:center">'
  + '<div class="lbl">Calendrier</div>'
  + '<div class="titre" style="margin-top:8px">' + MOIS_FR[now.getMonth()] + ' ' + now.getFullYear() + '</div>'
  + '</div>';
}

function renderBudget() {
  document.getElementById('pg-budget').innerHTML =
    '<div class="card" style="margin-top:8px;padding:32px 20px;text-align:center">'
  + '<div class="lbl">Budget</div>'
  + '<div class="titre" style="margin-top:8px">Reste à vivre</div>'
  + '</div>';
}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
applyTheme(new Date().getMonth());
goPage('jour');
</script>
</body>
</html>
